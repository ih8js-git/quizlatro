[manifest]
version = "1.0.0"
dump_lua = true
priority = 100

# Register quizlatro.lua as a requirable module
[[patches]]
[patches.module]
source = "quizlatro.lua"
name = "quizlatro.core"

# Inject the mod directory path into the module
[[patches]]
[patches.pattern]
target = '=[lovely quizlatro.core "quizlatro.lua"]'
pattern = "local MOD_DIR = nil -- patched by lovely"
position = "at"
payload = '''local MOD_DIR = [[{{lovely_hack:patch_dir}}]]'''
match_indent = true

# Load the module before Game:start_up so our hook wraps it
[[patches]]
[patches.pattern]
target = "main.lua"
pattern = "G:start_up()"
position = "before"
payload = '''require("quizlatro.core")'''
match_indent = true
