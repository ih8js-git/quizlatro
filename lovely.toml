[manifest]
version = "1.0.0"
dump_lua = true
priority = 100

# Register quizlatro.lua as a requirable module
[[patches]]
[patches.module]
source = "quizlatro.lua"
name = "quizlatro.core"

# Inject the mod directory path into the module
[[patches]]
[patches.pattern]
target = '=[lovely quizlatro.core "quizlatro.lua"]'
pattern = "local MOD_DIR = nil -- patched by lovely"
position = "at"
payload = '''local MOD_DIR = [[{{lovely_hack:patch_dir}}]]'''
match_indent = true

# Load the module before Game:start_up so our hook wraps it
[[patches]]
[patches.pattern]
target = "main.lua"
pattern = "G:start_up()"
position = "before"
payload = '''require("quizlatro.core")'''
match_indent = true

# Add Quizlatro button definition to the pause menu
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = "local customize = UIBox_button{ label = {localize('b_customize_deck')}, button = \"customize_deck\", minw = 5}"
position = "after"
payload = '''local quizlatro_sett = UIBox_button{ label = {"Quizlatro"}, button = "quizlatro_settings", minw = 5}'''
match_indent = true

# Insert Quizlatro button into the pause menu contents table
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = "customize,"
position = "after"
payload = '''quizlatro_sett,'''
match_indent = true
